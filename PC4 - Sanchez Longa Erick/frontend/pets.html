<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mascotas Perdidas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">MascotasApp</a>
            <a class="nav-link text-white" href="index.html">Volver al Inicio</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4">
                <h3>Reportar Mascota</h3>
                <form id="petForm">
                    <input type="text" id="name" class="form-control mb-2" placeholder="Nombre" required>
                    <input type="text" id="species" class="form-control mb-2" placeholder="Especie (Ej. Perro)" required>
                    <input type="text" id="breed" class="form-control mb-2" placeholder="Raza" required>
                    <input type="text" id="location" class="form-control mb-2" placeholder="Ubicación" required>
                    <textarea id="description" class="form-control mb-2" placeholder="Descripción"></textarea>
                    <button type="submit" class="btn btn-primary w-100">Guardar</button>
                </form>
            </div>
            <div class="col-md-8">
                <h3>Mascotas Registradas</h3>
                <ul class="list-group" id="petList"></ul>
            </div>
        </div>
    </div>

<div class="mb-3">
    <button class="btn btn-sm btn-info" onclick="loadPets('name')">Ordenar por Nombre</button>
    <button class="btn btn-sm btn-info" onclick="loadPets('species')">Ordenar por Especie</button>
</div>
<script src="js/pets.js"></script>

</body>
</html>
