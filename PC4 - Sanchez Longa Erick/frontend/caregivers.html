<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cuidadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">MascotasApp</a>
            <a class="nav-link text-white" href="index.html">Volver al Inicio</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4">
                <h3>Registrar Cuidador</h3>
                <form id="cgForm">
                    <input type="text" id="name" class="form-control mb-2" placeholder="Nombre completo" required>
                    <select id="type" class="form-select mb-2">
                        <option value="Solidario">Solidario</option>
                        <option value="Profesional">Profesional</option>
                        <option value="Especializado">Especializado</option>
                    </select>
                    <input type="text" id="species" class="form-control mb-2" placeholder="Especies (Ej. Perros, Gatos, Todas)" required>
                    <div class="form-check mb-2">
                        <input type="checkbox" class="form-check-input" id="alerts" checked>
                        <label class="form-check-label" for="alerts">Activar alertas (Observer)</label>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Registrar</button>
                </form>
            </div>
            <div class="col-md-8">
                <h3>Lista de Cuidadores</h3>
                <ul class="list-group" id="cgList"></ul>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000/caregivers/";

        async function loadCaregivers() {
            const res = await fetch(API_URL);
            const cgs = await res.json();
            const list = document.getElementById("cgList");
            list.innerHTML = "";
            cgs.forEach(c => {
                list.innerHTML += `<li class="list-group-item"><strong>${c.name}</strong> - ${c.caregiver_type} <br><small>Acepta: ${c.accepted_species} | Alertas: ${c.alerts_active ? 'ON' : 'OFF'}</small></li>`;
            });
        }

        document.getElementById("cgForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById("name").value,
                caregiver_type: document.getElementById("type").value,
                accepted_species: document.getElementById("species").value,
                alerts_active: document.getElementById("alerts").checked
            };
            await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            e.target.reset();
            loadCaregivers();
        });

        loadCaregivers();
    </script>
</body>
</html>
